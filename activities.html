<!doctype html>
<html lang="en" data-embed="activities">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2025 Activities · TrueCommerce Vietnam Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="embed.css">
</head>
<body>
<div class="brand-strip">
  <div class="logo"></div>
  <span class="name">TrueCommerce</span>
  <span class="sep"></span>
  <span>Vietnam Office · 2025 Activities</span>
</div>

<div class="embed-wrap embed-section">
  <div class="sec-head" style="max-width:none">
    <div class="gallery-head">
      <div>
        <span class="eyebrow" style="color:var(--tc-coral)">Office life</span>
        <h2>The year in <span class="accent">moments.</span></h2>
        <p class="vn">Engagement activities at Vietnam office.</p>
      </div>
      <div class="filters" id="filters"></div>
    </div>
  </div>

  <div class="masonry" id="masonry"></div>
  <div class="gallery-empty" id="galleryEmpty" style="display:none">
    <div class="ge-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </div>
    <h3>No events yet for this year</h3>
    <p>End-users can add a new event by uploading a folder to the repo.<br/>See README for instructions.</p>
  </div>
  <div class="gallery-loading" id="galleryLoading">
    <div class="gl-spinner"></div>
    <p>Loading the year in moments…</p>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="Close">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <button class="lb-prev" id="lbPrev" aria-label="Previous">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="lb-next" id="lbNext" aria-label="Next">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg>
  </button>
  <div class="lb-stage" id="lbStage"></div>
  <div class="lb-foot">
    <div class="lb-meta">
      <div class="lb-title" id="lbTitle">—</div>
      <div class="lb-counter" id="lbCounter">1 / 1</div>
    </div>
    <div class="lb-thumbs" id="lbThumbs"></div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG — edit these two lines once after creating your repo.
// ============================================================
const GITHUB_USER   = 'nhatquynhvp2806';
const GITHUB_REPO   = 'truecommerce-vn-office-page';
const GITHUB_BRANCH = 'main';
const EVENTS_PATH   = 'events';
const CACHE_TTL_MS  = 60 * 60 * 1000;

(async () => {
  const masonry  = document.getElementById('masonry');
  const filters  = document.getElementById('filters');
  const loading  = document.getElementById('galleryLoading');
  const empty    = document.getElementById('galleryEmpty');
  if(!masonry) return;

  const isImg   = n => /\.(jpe?g|png|webp|gif|avif)$/i.test(n);
  const isVideo = n => /\.(mp4|mov|webm|m4v)$/i.test(n);
  const isCover = n => /^cover\.(jpe?g|png|webp)$/i.test(n);

  const parseFolderName = (name) => {
    const m = name.match(/^(\d{4})[-_\s]?(\d{2})?[-_\s]+(.+)$/);
    if(m){
      return { year: parseInt(m[1], 10), month: m[2] ? parseInt(m[2], 10) : 0, title: m[3].replace(/[-_]+/g, ' ').replace(/\s+/g,' ').trim() };
    }
    const ym = name.match(/(\d{4})/);
    return { year: ym ? parseInt(ym[1], 10) : new Date().getFullYear(), month: 0, title: name.replace(/[-_]+/g, ' ').trim() };
  };

  const raw = (path) => 'https://raw.githubusercontent.com/' + GITHUB_USER + '/' + GITHUB_REPO + '/' + GITHUB_BRANCH + '/' + path;
  const api = (path) => 'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + path + '?ref=' + GITHUB_BRANCH;

  async function fetchEvents(){
    const cacheKey = 'tc-events-' + GITHUB_USER + '-' + GITHUB_REPO;
    try { const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null'); if(cached && Date.now() - cached.t < CACHE_TTL_MS) return cached.d; } catch {}
    if(GITHUB_USER === 'YOUR_GITHUB_USER') return [];
    const r = await fetch(api(EVENTS_PATH));
    if(!r.ok) throw new Error('Failed (HTTP ' + r.status + '). Is the repo public?');
    const folders = (await r.json()).filter(e => e.type === 'dir');
    const events = await Promise.all(folders.map(async (f) => {
      const meta = parseFolderName(f.name);
      const r2 = await fetch(api(EVENTS_PATH + '/' + f.name));
      if(!r2.ok) return null;
      const files = (await r2.json()).filter(x => x.type === 'file');
      const images = files.filter(x => isImg(x.name)).map(x => x.name).sort();
      const cover  = files.find(x => isCover(x.name))?.name || images[0];
      const video  = files.find(x => isVideo(x.name))?.name || null;
      if(!images.length && !video) return null;
      return { folder: f.name, path: EVENTS_PATH + '/' + f.name, ...meta, images, cover, video };
    }));
    const out = events.filter(Boolean);
    try { localStorage.setItem(cacheKey, JSON.stringify({ t: Date.now(), d: out })); } catch {}
    return out;
  }

  const ASPECTS = ['h-m','h-l','h-s','h-m','h-xl','h-s','h-l','h-m'];
  let allEvents = [];

  function render(year){
    masonry.innerHTML = '';
    const list = allEvents.filter(e => e.year === year);
    if(!list.length){ empty.style.display = ''; return; }
    empty.style.display = 'none';
    list.sort((a,b) => b.month - a.month);
    list.forEach((ev, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile ' + ASPECTS[i % ASPECTS.length] + (ev.video ? ' has-video' : '');
      const coverUrl = ev.cover ? raw(ev.path + '/' + ev.cover) : '';
      const total = (ev.images?.length || 0) + (ev.video ? 1 : 0);
      tile.innerHTML =
        '<div class="ph">' +
          (coverUrl ? '<img src="' + coverUrl + '" alt="' + ev.title + '" loading="lazy" />' : '') +
          '<div class="grad"></div>' +
          (ev.video ? '<div class="video-pill"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>' : '') +
          (total > 1 ? '<div class="count-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>' + total + '</div>' : '') +
          '<div class="label"><div class="ttl">' + ev.title + '</div></div>' +
        '</div>';
      tile.addEventListener('click', () => openLightbox(ev));
      masonry.appendChild(tile);
    });
    if(window.tcEmbedNotifyHeight) setTimeout(window.tcEmbedNotifyHeight, 400);
  }

  function buildYearFilter(){
    if(!allEvents.length){ filters.innerHTML = ''; return null; }
    const counts = {};
    allEvents.forEach(e => { counts[e.year] = (counts[e.year]||0) + 1; });
    const years = Object.keys(counts).map(Number).sort((a,b) => b - a);
    const cur = new Date().getFullYear();
    const def = years.includes(cur) ? cur : years[0];
    filters.innerHTML = '';
    years.forEach(y => {
      const b = document.createElement('button');
      b.dataset.year = String(y);
      b.textContent = String(y);
      if(y === def) b.classList.add('active');
      b.addEventListener('click', () => {
        [...filters.children].forEach(x => x.classList.toggle('active', x === b));
        render(y);
      });
      filters.appendChild(b);
    });
    return def;
  }

  // ---------- Lightbox ----------
  const lb        = document.getElementById('lightbox');
  const lbStage   = document.getElementById('lbStage');
  const lbTitle   = document.getElementById('lbTitle');
  const lbCounter = document.getElementById('lbCounter');
  const lbThumbs  = document.getElementById('lbThumbs');
  const lbPrev    = document.getElementById('lbPrev');
  const lbNext    = document.getElementById('lbNext');
  const lbClose   = document.getElementById('lbClose');
  let lbItems = [], lbIdx = 0, lbEvent = null;

  function openLightbox(ev){
    lbEvent = ev; lbItems = [];
    (ev.images || []).forEach(name => lbItems.push({ type:'image', url: raw(ev.path + '/' + name) }));
    if(ev.video) lbItems.push({ type:'video', url: raw(ev.path + '/' + ev.video) });
    if(!lbItems.length) return;
    lbIdx = 0; renderLightbox();
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(){
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbStage.innerHTML = '';
  }
  function renderLightbox(){
    const it = lbItems[lbIdx];
    lbStage.innerHTML = '';
    if(it.type === 'image'){
      const img = document.createElement('img');
      img.src = it.url; img.alt = lbEvent.title;
      lbStage.appendChild(img);
    } else {
      const v = document.createElement('video');
      v.src = it.url; v.controls = true; v.autoplay = true;
      lbStage.appendChild(v);
    }
    lbTitle.textContent = lbEvent.title;
    lbCounter.textContent = (lbIdx + 1) + ' / ' + lbItems.length;
    lbPrev.disabled = lbIdx === 0;
    lbNext.disabled = lbIdx === lbItems.length - 1;
    lbThumbs.innerHTML = '';
    lbItems.forEach((it2, i) => {
      const t = document.createElement('button');
      t.className = 'lb-thumb' + (i === lbIdx ? ' active' : '');
      if(it2.type === 'image'){
        const img = document.createElement('img');
        img.src = it2.url; img.loading = 'lazy';
        t.appendChild(img);
      } else {
        t.innerHTML = '<div class="video-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>';
      }
      t.addEventListener('click', () => { lbIdx = i; renderLightbox(); });
      lbThumbs.appendChild(t);
    });
  }
  lbPrev.addEventListener('click', () => { if(lbIdx > 0){ lbIdx--; renderLightbox(); } });
  lbNext.addEventListener('click', () => { if(lbIdx < lbItems.length - 1){ lbIdx++; renderLightbox(); } });
  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if(e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if(!lb.classList.contains('open')) return;
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowLeft' && lbIdx > 0){ lbIdx--; renderLightbox(); }
    if(e.key === 'ArrowRight' && lbIdx < lbItems.length - 1){ lbIdx++; renderLightbox(); }
  });

  try { allEvents = await fetchEvents(); }
  catch (err) { console.error('Gallery fetch failed:', err); allEvents = []; }
  loading.style.display = 'none';
  if(!allEvents.length){ filters.innerHTML = ''; empty.style.display = ''; return; }
  const def = buildYearFilter();
  render(def);
})();
</script>

<script src="embed.js"></script>
</body>
</html>
