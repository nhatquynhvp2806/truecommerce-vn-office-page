<!doctype html>
<html lang="en" data-embed="activities">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Activities · TrueCommerce Vietnam Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="embed.css">
</head>
<body>
<div class="embed-wrap embed-section">
  <div class="sec-head" style="max-width:none">
    <div class="gallery-head">
      <div>
        <span class="eyebrow" style="color:var(--tc-coral)">Office life</span>
        <h2>Moments that <span class="accent">make us.</span></h2>
        <p class="vn">Engagement activities at Vietnam office.</p>
      </div>
      <div class="filters" id="filters"></div>
    </div>
  </div>

  <div class="masonry" id="masonry"></div>
  <div class="gallery-empty" id="galleryEmpty" style="display:none">
    <div class="ge-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </div>
    <h3>No events yet for this year</h3>
    <p>Upload a new event folder to SharePoint to get started.</p>
  </div>
  <div class="gallery-loading" id="galleryLoading">
    <div class="gl-spinner"></div>
    <p>Loading the year in moments…</p>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="Close">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <button class="lb-prev" id="lbPrev" aria-label="Previous">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="lb-next" id="lbNext" aria-label="Next">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg>
  </button>
  <div class="lb-stage" id="lbStage"></div>
  <div class="lb-foot">
    <div class="lb-meta">
      <div class="lb-title" id="lbTitle">—</div>
      <div class="lb-counter" id="lbCounter">1 / 1</div>
    </div>
    <div class="lb-thumbs" id="lbThumbs"></div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG SharePoint
// ============================================================
const SP_SITE    = 'vietnampeopleteam';
const SP_HOST    = 'tcapc.sharepoint.com';
const EVENT_PATH = '/sites/vietnampeopleteam/Shared Documents/8. People Experience/VN Office Page/Event Photo';

const isImg   = n => /\.(jpe?g|png|webp|gif|avif)$/i.test(n);
const isCover = n => /^cover\.(jpe?g|png|webp)$/i.test(n);

// SharePoint REST API helpers
const spApi = (path) =>
  `https://${SP_HOST}/sites/${SP_SITE}/_api/web/GetFolderByServerRelativeUrl('${encodeURIComponent(path)}')/Folders?$select=Name,ServerRelativeUrl&$orderby=Name`;
const spFiles = (path) =>
  `https://${SP_HOST}/sites/${SP_SITE}/_api/web/GetFolderByServerRelativeUrl('${encodeURIComponent(path)}')/Files?$select=Name,ServerRelativeUrl`;
const spImgUrl = (serverRelUrl) =>
  `https://${SP_HOST}${serverRelUrl}`;

async function spFetch(url) {
  const r = await fetch(url, {
    headers: { 'Accept': 'application/json;odata=verbose' },
    credentials: 'include'
  });
  if (!r.ok) throw new Error('SharePoint fetch failed: ' + r.status);
  const j = await r.json();
  return j.d.results;
}

async function fetchEvents() {
  // Get year folders (2025, 2026, ...)
  const yearFolders = await spFetch(spApi(EVENT_PATH));
  const events = [];

  await Promise.all(yearFolders.map(async (yf) => {
    const year = parseInt(yf.Name, 10);
    if (isNaN(year)) return;

    // Get event folders inside each year
    const eventFolders = await spFetch(spApi(yf.ServerRelativeUrl));

    await Promise.all(eventFolders.map(async (ef) => {
      const title = ef.Name.replace(/^\d{4}[-_\s]*\d{0,2}[-_\s]*/,'').replace(/[-_]+/g,' ').trim() || ef.Name;

      // Get files inside event folder
      const files = await spFetch(spFiles(ef.ServerRelativeUrl));
      const images = files.filter(f => isImg(f.Name));
      if (!images.length) return;

      const coverFile = images.find(f => isCover(f.Name)) || images[0];
      const otherImages = images.filter(f => f.Name !== coverFile.Name);
      const allImages = [coverFile, ...otherImages];

      events.push({
        year,
        title,
        cover: spImgUrl(coverFile.ServerRelativeUrl),
        images: allImages.map(f => ({ url: spImgUrl(f.ServerRelativeUrl), name: f.Name })),
      });
    }));
  }));

  return events;
}

// ── Render ──────────────────────────────────────────────────
const ASPECTS = ['h-m','h-l','h-s','h-m','h-xl','h-s','h-l','h-m'];
let allEvents = [];

function render(year) {
  const masonry = document.getElementById('masonry');
  const empty   = document.getElementById('galleryEmpty');
  masonry.innerHTML = '';
  const list = allEvents.filter(e => e.year === year);
  if (!list.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';

  list.forEach((ev, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile ' + ASPECTS[i % ASPECTS.length];
    tile.innerHTML =
      '<div class="ph">' +
        '<img src="' + ev.cover + '" alt="' + ev.title + '" loading="lazy" />' +
        '<div class="grad"></div>' +
        (ev.images.length > 1 ? '<div class="count-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>' + ev.images.length + '</div>' : '') +
        '<div class="label"><div class="ttl">' + ev.title + '</div></div>' +
      '</div>';
    tile.addEventListener('click', () => openLightbox(ev));
    masonry.appendChild(tile);
  });
  if (window.tcEmbedNotifyHeight) setTimeout(window.tcEmbedNotifyHeight, 400);
}

function buildYearFilter(years, defaultYear) {
  const filters = document.getElementById('filters');
  filters.innerHTML = '';
  years.forEach(y => {
    const b = document.createElement('button');
    b.textContent = String(y);
    b.dataset.year = String(y);
    if (y === defaultYear) b.classList.add('active');
    b.addEventListener('click', () => {
      [...filters.children].forEach(x => x.classList.toggle('active', x === b));
      render(y);
    });
    filters.appendChild(b);
  });
}

// ── Lightbox ────────────────────────────────────────────────
const lb        = document.getElementById('lightbox');
const lbStage   = document.getElementById('lbStage');
const lbTitle   = document.getElementById('lbTitle');
const lbCounter = document.getElementById('lbCounter');
const lbThumbs  = document.getElementById('lbThumbs');
const lbPrev    = document.getElementById('lbPrev');
const lbNext    = document.getElementById('lbNext');
const lbClose   = document.getElementById('lbClose');
let lbItems = [], lbIdx = 0, lbEvent = null;

function openLightbox(ev) {
  lbEvent = ev;
  lbItems = ev.images;
  lbIdx = 0;
  renderLightbox();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
  lbStage.innerHTML = '';
}
function renderLightbox() {
  const it = lbItems[lbIdx];
  lbStage.innerHTML = '';
  const img = document.createElement('img');
  img.src = it.url; img.alt = lbEvent.title;
  lbStage.appendChild(img);

  lbTitle.textContent = lbEvent.title;
  lbCounter.textContent = (lbIdx + 1) + ' / ' + lbItems.length;
  lbPrev.disabled = lbIdx === 0;
  lbNext.disabled = lbIdx === lbItems.length - 1;

  lbThumbs.innerHTML = '';
  lbItems.forEach((it2, i) => {
    const t = document.createElement('button');
    t.className = 'lb-thumb' + (i === lbIdx ? ' active' : '');
    const img2 = document.createElement('img');
    img2.src = it2.url; img2.loading = 'lazy';
    t.appendChild(img2);
    t.addEventListener('click', () => { lbIdx = i; renderLightbox(); });
    lbThumbs.appendChild(t);
  });
}

lbPrev.addEventListener('click', () => { if (lbIdx > 0) { lbIdx--; renderLightbox(); } });
lbNext.addEventListener('click', () => { if (lbIdx < lbItems.length - 1) { lbIdx++; renderLightbox(); } });
lbClose.addEventListener('click', closeLightbox);
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && lbIdx > 0) { lbIdx--; renderLightbox(); }
  if (e.key === 'ArrowRight' && lbIdx < lbItems.length - 1) { lbIdx++; renderLightbox(); }
});

// ── Init ────────────────────────────────────────────────────
(async () => {
  const loading = document.getElementById('galleryLoading');
  const empty   = document.getElementById('galleryEmpty');
  const filters = document.getElementById('filters');
  try {
    allEvents = await fetchEvents();
  } catch (err) {
    console.error('SharePoint fetch failed:', err);
    loading.style.display = 'none';
    empty.style.display = '';
    empty.querySelector('p').textContent = 'Could not load events. Make sure you are logged in to Microsoft 365.';
    return;
  }

  loading.style.display = 'none';

  if (!allEvents.length) { filters.innerHTML = ''; empty.style.display = ''; return; }

  const years = [...new Set(allEvents.map(e => e.year))].sort((a,b) => b - a);
  const defaultYear = years[0];
  buildYearFilter(years, defaultYear);
  render(defaultYear);
})();
</script>

<script src="embed.js"></script>
</body>
</html>
